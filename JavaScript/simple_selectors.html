<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Document</title>
    <style>
      *{
        background-color:yellow;
        font-style:oblique;
      }
      #single{
        font-size:25px;
        color:orange;
      }
      .multiple{
           font: 50px;
           color:red;
           border:2px solid yellow;
      }
      h1{
        text-align:center;
        text-shadow:2px 2px 5px black;

      }
      .abc{
        color:blue;
        border:2px solid red;
       

      }
      p{
        color:green;
        font: 20px;
      }



    </style>
</head>
<body>
    <h1>Simple selectors</h1>
    <h3>element selectors</h3>
    <div id="single">This is a id selector</div>
    <div class="multiple">This is a class selector</div>
    <div class="abc">
        <h2>This is a group selector</h2>
    <h3>This is a group selector</h3>
    </div>
    <p>This is a element selector</p>
</body>
</html>
