<script>
    document.write("For Loop:");
    for(let i=1;i<=10;i++){
        
        document.write(i+" ");
    
    }
    document.write("<br>");

    let i=1;
    document.write("While Loop:");
    while(i<=10){
        document.write(i+" ");
        
        i++;
    }
    document.write("<br>");


 i=1;
 document.write(" Do-While Loop:");
    do{
        document.write(i+" ")
        i++;
    }
    while(i<=10);
    document.write("<br>");

    
    
    function fac(num){
        if(num==0 || num==1){
            return 1;
        }
        else{
            return num*fac(num-1);
        }
    }
        let num =Number(window.prompt("Enter a number"));
        document.write("Factorial of "+num+ " is :" +fac(num)+"<br>");
    
       function even(n){
        for(let i=1;i<=n;i++){
            if(i % 2 ==0){
                document.write(i +" ");
            }
        }
        document.write("<br>");
    }

    let n = Number(window.prompt("Enter a number:"));
    document.write("Even Numbers are:"+even(n));



    void printPrime(n){
    let i, num, flag;

    for(num = 2; num <= n; num++){
        flag = 1;

        for(i = 2;i*i <= num;i++){
            if(num % i == 0){
                flag = 0;
                break;
            }
        }

        if(flag == 1){
            document.write(num+" ");
        }
    }
}

</script>
