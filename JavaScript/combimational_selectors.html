<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Document</title>
    <style>
        * {
            font-style:italic;
            background-color:lightgoldenrodyellow;
        }
        .good {
            border:2px solid black;
            
        }
        .good p{
            background-color:yellow;
        }
        .good > p {
            color:red;  
        }
        
        .good ~ div {
            background-color:red;
        }
    </style>
</head>
<body>
    <div class="good">
        <p>This is a Child selector</p>
        <div>
            <p>Example 2</p>
            <p>Example 3</p>
        </div>
        <div>
            <p>Example 4</p>
            <p>Example 5</p>
        </div>  
    </div>
    <div>
        <h2>This is a heading</h2>
        <p>This is a paragraph.</p>
        <div>
            <p>This is a styling</p>
        </div>
    </div>

</body>
</html>
