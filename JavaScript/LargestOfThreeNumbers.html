<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Largest Number</title>
</head>
<body>
    <label>Enter 1st number</label>
    <input type="number" id="num1">
    <label>Enter 2nd number</label>
    <input type="number" id="num2">
    <label>Enter 3rd number</label>
    <input type="number" id="num3">
 
</body>
<script>
    let a = element.getElementById("num1").value;
    let b = element.getElementById("num2").value;
    let c = element.getElementById("num3").value;

    if(a > b && a > c){
        document.write("Largest number is "+a);      
        alert("Largest number is"+a);
    }
    else if(b > a && b > c){
        document.write(b + " is the largest number");
        alert(b + " is the largest number<br>");
    }
    
    else if(c > a && c > b){
        document.write(c + " is the largest number");
        alert(c + " is the largest number<br>");
    }
    else{
        document.read("All numbers are equal");
        alert("All numbers are equal<br>");
    }
 </script>
</html>
