<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video and Audio Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        video{
            width: 500px;
            height:1000px;
            
        }
    </style>
</head>
<body>
    <h1>Video Player</h1>
    <video controls>
        <source src="video.mp4" type="video/mp4">
     
    </video>

    <h1>Audio Player</h1>
    <audio controls>
        <source src="background-music-159125.mp3" type="audio/mpeg">
        
    </audio>
</body>
</html>
