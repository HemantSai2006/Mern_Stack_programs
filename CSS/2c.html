<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margins, Borders & Spacing</title>
    <style>
       

        body {
            
            background-color: #f2f6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h2 {
            margin-top: 30px;
            margin-bottom: 15px;
            color: #333;
        }

        
        .border-solid {
            border: 3px solid #333;
            padding: 15px;
            margin-bottom: 20px;
            background-color: white;
        }

        #border-dashed {
            border: 2px dashed #0066cc;
            padding: 15px;
            margin-bottom: 20px;
            background-color: white;
        }

        .border-rounded {
            border: 2px solid #ff6b6b;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            background-color: white;
        }
        #border-double{
            border: 2px double blue;
            border-radius:10px;
            padding:15px;
            margin-bottom:20px;
            background-color:lightblue;
        }

        
        

    
       
    </style>
</head>
<body>
    <div class="container">
        <h1>Margins, Borders & Spacing</h1>

        <h2>Solid Border</h2>
        <div class="border-solid">This box has a solid border.</div>

        <h2>Dashed Border</h2>
        <div id="border-dashed">This box has a dashed border.</div>

        <h2>Rounded Border</h2>
        <div class="border-rounded">This box has rounded corners.</div>
        
        <h2>Double Border</h2>
        <div id ="border-double"> This box is a double bordered</div>

       

       
    </div>
</body>
</html>
